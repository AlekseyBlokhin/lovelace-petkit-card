# Full example configuration for the petkit-puramax-card, referenced from
# README.md's configuration reference. Every entity id/device id below is a
# placeholder — replace them with your own PETKIT PURAMAX device/entities.
#
# See README.md's "How per-cat visit reconstruction works" section for how
# total_use/last_used_by are turned into per-cat visit history -- no helper
# entities or companion automation needed.

type: custom:petkit-puramax-card
title: PETKIT PURAMAX

# Auto-detects total_use/last_used_by/error/last_event/state from this
# device's own entity registry. Pick it via the visual editor's native
# device selector, or find its id under Settings -> Devices & services.
device_id: 400018390abc123

# Only needed if you're not using device_id, or want to override one of the
# auto-detected entities:
# device_entities:
#   total_use: sensor.petkit_puramax_total_use
#   last_used_by: sensor.petkit_puramax_last_used_by
#   error: sensor.petkit_puramax_error
#   last_event: sensor.petkit_puramax_last_event
#   state: sensor.petkit_puramax_state

# Optional: relabel or add device event states without editing the card.
# Merged over the built-in PURAMAX defaults (this config wins on conflicts).
event_labels:
  maintenance_mode: Maintenance mode
  manual_odor_completed: Manual odor removal done
  auto_cleaning_completed: Auto cleaning done

# Every section below defaults to shown; set any of these to false to hide it.
# show_state: true
# show_history: true
# show_working_records: true
# show_analytics: true

cats:
  # name must exactly match this cat's value as reported by
  # device_entities.last_used_by. color accepts a raw CSS color (hex, as
  # here) or a named HA palette color like "blue"/"deep-orange" (what the
  # visual editor's color picker writes when you pick a swatch).
  - name: Whiskers
    color: "#4fc3f7"
  - name: Mittens
    color: "deep-orange"

# name/icon are both overrides -- leave them unset (as the second chip
# does below) to show the entity's own friendly name/icon instead.
info_row:
  - entity: sensor.petkit_puramax_consumable_remaining
    name: Consumable
    icon: mdi:spray-bottle
    unit: "%"
    warn_below: 10
  - entity: binary_sensor.petkit_puramax_bin_full
    value_map:
      "on": Full
      "off": OK
    warn_state: "on"

# tap_action/hold_action/double_tap_action use the same native action
# config every built-in card's interactions do -- perform-action/toggle/
# navigate/url/more-info/none, each with an optional native `confirmation`
# dialog. `toggle` is the natural choice for a `button.*` entity too: HA's
# own frontend special-cases the button domain to call its `press` service
# directly (there's no on/off state to toggle), so it's simpler than -- and
# exactly as correct as -- spelling out perform-action/button.press/target
# by hand; reach for perform-action instead when you need to call a
# specific service that isn't just "this entity's own default action" (e.g.
# a different entity/domain than the one the row displays). A device with a
# pair of buttons that only make sense in one state at a time (like
# Start/Exit Maintenance here) is just two ordinary rows, each gated by its
# own `visibility` condition, rather than one button with special-cased
# behavior -- together they read as a single control that changes what it
# shows depending on the device's current state.
controls_row:
  - name: Clean now
    icon: mdi:broom
    entity: button.petkit_puramax_clean
    tap_action:
      action: toggle
  - name: Odor removal
    icon: mdi:spray-bottle
    entity: button.petkit_puramax_odor_removal
    tap_action:
      action: toggle
      confirmation:
        text: Run a manual odor removal cycle now?
  - name: Start Maintenance
    icon: mdi:wrench
    entity: button.petkit_puramax_maintenance_start
    tap_action:
      action: toggle
    visibility:
      - condition: state
        entity: sensor.petkit_puramax_state
        state_not: maintenance_mode
  - name: Exit Maintenance
    icon: mdi:wrench
    entity: button.petkit_puramax_maintenance_exit
    tap_action:
      action: toggle
    visibility:
      - condition: state
        entity: sensor.petkit_puramax_state
        state: maintenance_mode
  # A toggle-style control (e.g. a switch) lights up automatically whenever
  # its own entity is "on" -- no extra config needed for that part.
  - name: Auto cleaning
    entity: switch.petkit_puramax_auto_cleaning
    tap_action:
      action: toggle

decline_threshold_pct: 60

# Optional "no visit in N hours" safety alert, per cat. Shows a banner in the
# card and, if notify_service is set, also pushes a notification the first
# time a cat crosses the threshold (not on every re-render). Note this only
# fires while the card itself is loaded in a browser/companion-app tab --
# pair with a native HA automation if you need a guarantee independent of
# whether a dashboard is open.
no_visit_alert_hours: 8
notify_service: notify.mobile_app_your_phone
