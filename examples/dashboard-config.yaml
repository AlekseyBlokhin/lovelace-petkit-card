# Full example configuration for the petkit-puramax-card, referenced from
# README.md's configuration reference. Every entity id below is a
# placeholder — replace them with your own PETKIT PURAMAX entities.
#
# See README.md's "How per-cat visit reconstruction works" section for how
# total_use/last_used_by are turned into per-cat visit history -- no helper
# entities or companion automation needed.

type: custom:petkit-puramax-card
title: PETKIT PURAMAX

device_entities:
  total_use: sensor.petkit_puramax_total_use
  last_used_by: sensor.petkit_puramax_last_used_by
  error: sensor.petkit_puramax_error
  last_event: sensor.petkit_puramax_last_event
  state: sensor.petkit_puramax_state

# Optional: relabel or add device event states without editing the card.
# Merged over the built-in PURAMAX defaults (this config wins on conflicts).
event_labels:
  maintenance_mode: Maintenance mode
  manual_odor_completed: Manual odor removal done
  auto_cleaning_completed: Auto cleaning done

cats:
  # name must exactly match this cat's value as reported by
  # device_entities.last_used_by.
  - name: Whiskers
    color: "#4fc3f7"
  - name: Mittens
    color: "#ff8a65"

info_row:
  - entity: sensor.petkit_puramax_consumable_remaining
    name: Consumable
    icon: mdi:spray-bottle
    unit: "%"
    warn_below: 10
  - entity: binary_sensor.petkit_puramax_bin_full
    name: Waste bin
    icon: mdi:trash-can
    value_map:
      "on": Full
      "off": OK
    warn_state: "on"

controls_row:
  - name: Clean now
    icon: mdi:broom
    action: press
    entity: button.petkit_puramax_clean
  - name: Odor removal
    icon: mdi:spray-bottle
    action: press
    entity: button.petkit_puramax_odor_removal
    confirm: Run a manual odor removal cycle now?
  - name: Maintenance
    icon: mdi:wrench
    action: toggle_maintenance
    start_entity: button.petkit_puramax_maintenance_start
    exit_entity: button.petkit_puramax_maintenance_exit
  - name: Details
    icon: mdi:information-outline
    action: more_info
    entity: sensor.petkit_puramax_state

decline_threshold_pct: 60

# Optional "no visit in N hours" safety alert, per cat. Shows a banner in the
# card and, if notify_service is set, also pushes a notification the first
# time a cat crosses the threshold (not on every re-render). Note this only
# fires while the card itself is loaded in a browser/companion-app tab --
# pair with a native HA automation if you need a guarantee independent of
# whether a dashboard is open.
no_visit_alert_hours: 8
notify_service: notify.mobile_app_your_phone
