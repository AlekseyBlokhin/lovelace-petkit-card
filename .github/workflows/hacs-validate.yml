name: HACS validation

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, to catch drift from HACS validator changes even with no code changes.
    - cron: "0 6 * * 1"

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: "plugin"
